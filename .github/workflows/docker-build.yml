name: Build Docker image

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set version
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [[ -z "$LATEST" ]]; then
            NEW_VERSION="v1.0.0"
          else
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi
          echo "VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${NEW_VERSION}
          git push origin ${NEW_VERSION}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker buildx build \
            --platform linux/arm/v7 \
            --build-arg VERSION=${{ steps.version.outputs.VERSION }} \
            -t vg710-web-aws:${{ steps.version.outputs.VERSION }} \
            --output type=docker,dest=vg710-web-aws-${{ steps.version.outputs.VERSION }}.tar \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vg710-web-aws-${{ steps.version.outputs.VERSION }}
          path: vg710-web-aws-${{ steps.version.outputs.VERSION }}.tar
          retention-days: 30
